{% extends 'notes/base.html' %}
{% block content %}
<div class="container form-container">
    <div class="glass-panel form-card delete-card">
        <h1 class="form-title text-danger">Delete Note</h1>
        <div class="delete-warning">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                class="warning-icon">
                <path
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <p>Are you sure you want to delete the note <strong>"{{ note.title }}"</strong>?</p>
            <p class="text-muted">This action cannot be undone.</p>
        </div>
        <form method="post" class="styled-form delete-form">
            {% csrf_token %}
            <div class="form-actions delete-actions">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'note_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock content %}
