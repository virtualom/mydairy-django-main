databases:
  - name: mydiary-db
    databaseName: mydiary
    plan: free

services:
  - type: web
    name: mydiary-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn diary_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: mydiary-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
